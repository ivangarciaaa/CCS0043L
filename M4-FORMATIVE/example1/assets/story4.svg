<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Train station building -->
  <rect x="30" y="80" width="140" height="70" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <!-- Roof -->
  <polygon points="25,80 100,30 175,80" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <!-- Door -->
  <rect x="85" y="110" width="30" height="40" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <!-- Door handle -->
  <circle cx="112" cy="130" r="2" fill="#2c3e50"/>
  <!-- Windows -->
  <rect x="45" y="90" width="20" height="20" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <line x1="55" y1="90" x2="55" y2="110" stroke="#2c3e50" stroke-width="1"/>
  <line x1="45" y1="100" x2="65" y2="100" stroke="#2c3e50" stroke-width="1"/>
  <rect x="135" y="90" width="20" height="20" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <line x1="145" y1="90" x2="145" y2="110" stroke="#2c3e50" stroke-width="1"/>
  <line x1="135" y1="100" x2="155" y2="100" stroke="#2c3e50" stroke-width="1"/>
  <!-- Platform -->
  <rect x="20" y="150" width="160" height="10" fill="#7f8c8d"/>
</svg>
