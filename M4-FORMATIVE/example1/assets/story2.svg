<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Cat head icon -->
  <circle cx="100" cy="110" r="50" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <!-- Left ear -->
  <polygon points="70,60 50,30 75,70" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <!-- Right ear -->
  <polygon points="130,60 150,30 125,70" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <!-- Left eye -->
  <circle cx="85" cy="100" r="6" fill="#2c3e50"/>
  <!-- Right eye -->
  <circle cx="115" cy="100" r="6" fill="#2c3e50"/>
  <!-- Nose -->
  <polygon points="100,115 95,125 105,125" fill="#2c3e50"/>
  <!-- Mouth -->
  <path d="M 95 130 Q 100 135 105 130" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <!-- Rain drops -->
  <line x1="60" y1="160" x2="55" y2="175" stroke="#3498db" stroke-width="2"/>
  <line x1="85" y1="165" x2="80" y2="180" stroke="#3498db" stroke-width="2"/>
  <line x1="140" y1="160" x2="135" y2="175" stroke="#3498db" stroke-width="2"/>
</svg>
