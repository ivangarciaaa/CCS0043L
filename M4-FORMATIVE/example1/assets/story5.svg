<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Envelope -->
  <rect x="30" y="60" width="140" height="90" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <!-- Flap -->
  <polygon points="30,60 100,100 170,60" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <!-- Letter line -->
  <line x1="40" y1="75" x2="160" y2="75" stroke="#e74c3c" stroke-width="2"/>
  <line x1="40" y1="85" x2="160" y2="85" stroke="#e74c3c" stroke-width="2"/>
  <line x1="40" y1="95" x2="130" y2="95" stroke="#e74c3c" stroke-width="2"/>
  <!-- Heart stamp -->
  <path d="M 150 115 L 155 110 Q 160 110 160 115 Q 160 120 155 125 Q 150 120 150 115 Z" fill="#e74c3c"/>
  <!-- Stamp border -->
