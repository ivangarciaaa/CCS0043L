<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Flower stem -->
  <line x1="100" y1="50" x2="100" y2="150" stroke="#27ae60" stroke-width="3"/>
  <!-- Flower petals -->
  <circle cx="100" cy="40" r="8" fill="#e74c3c"/>
  <circle cx="115" cy="48" r="8" fill="#e74c3c"/>
  <circle cx="120" cy="63" r="8" fill="#e74c3c"/>
  <circle cx="112" cy="78" r="8" fill="#e74c3c"/>
  <circle cx="88" cy="78" r="8" fill="#e74c3c"/>
  <circle cx="80" cy="63" r="8" fill="#e74c3c"/>
  <circle cx="85" cy="48" r="8" fill="#e74c3c"/>
  <!-- Flower center -->
  <circle cx="100" cy="60" r="6" fill="#f39c12"/>
  <!-- Leaves -->
  <ellipse cx="75" cy="100" rx="8" ry="20" fill="#27ae60" transform="rotate(-30 75 100)"/>
  <ellipse cx="125" cy="120" rx="8" ry="20" fill="#27ae60" transform="rotate(40 125 120)"/>
  <!-- Butterflies -->
  <circle cx="140" cy="80" r="3" fill="#f39c12"/>
