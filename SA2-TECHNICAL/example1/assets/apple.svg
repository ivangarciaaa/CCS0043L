<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
  <!-- Apple body -->
  <circle cx="50" cy="55" r="40" fill="#DC143C"/>
  <!-- Apple top indent -->
  <ellipse cx="50" cy="20" rx="8" ry="10" fill="#DC143C"/>
  <!-- Stem -->
  <rect x="47" y="15" width="6" height="15" fill="#8B4513"/>
  <!-- Leaf -->
  <ellipse cx="60" cy="20" rx="12" ry="8" fill="#228B22" transform="rotate(-30 60 20)"/>
  <!-- Shine -->
  <ellipse cx="35" cy="40" rx="12" ry="15" fill="#FF6B6B" opacity="0.6"/>
</svg>